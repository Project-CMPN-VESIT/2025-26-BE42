[server]
addr = "0.0.0.0:50051"
enable_tls = true
# false = server-TLS only at transport layer.
# Enrollment works without a client cert.
# All handlers enforce auth via device DB + ECDSA — not TLS peer certs.
# Set true only after all clients are enrolled and have valid client certs.
require_client_cert = false

[tls]
ca_cert = "certs/ca.pem"
ca_key = "certs/ca.key"
server_cert = "certs/server.pem"
server_key = "certs/server.key"