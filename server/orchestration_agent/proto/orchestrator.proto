syntax = "proto3";
package orchestrator;

service Orchestrator {
  rpc RegisterDevice (CSR) returns (Certificate);
  rpc GetRound (DeviceId) returns (RoundMetadata);
  rpc SubmitReceipt (Receipt) returns (Ack);

  // Phase 1 of enrollment: client announces itself; server generates a
  // per-device OTP and prints it to the admin console.  No OTP is needed
  // to call this RPC — only device_pubkey and csr.
  rpc RequestEnrollment (EnrollmentRequest) returns (EnrollmentRequestAck);

  // Phase 2 of enrollment: client submits the OTP obtained out-of-band
  // from the administrator.  Server verifies OTP, signs CSR, returns cert.
  rpc EnrollDevice (EnrollRequest) returns (EnrollResponse);
}

message CSR {
  bytes device_pubkey = 1;
}

message Certificate {
  bytes pem = 1;
}

message DeviceId {
  bytes id = 1;
}

message RoundMetadata {
  uint64 round_id = 1;
  string model_version = 2;
  double epsilon_max = 3;
  string upload_uri = 4;
  string state = 5;
  uint32 num_updates = 6;
  string aggregation_mode = 7;
}

message Receipt {
  bytes device_id = 1;
  uint64 round_id = 2;
  bytes payload_hash = 3;
  double epsilon_spent = 4;
  bytes signature = 5;
  string enc_uri = 6;
  string scheme = 7;
  string nonce = 8;
}

message Ack {
  bool ok = 1;
}

// ── New: enrollment request (phase 1, no OTP required) ───────────────────────
message EnrollmentRequest {
  // Device's TPM-backed public key (PEM encoded)
  bytes device_pubkey = 1;
  // Certificate Signing Request (PEM encoded)
  bytes csr = 2;
  // Human-readable device info shown to the admin (e.g. "Win11/HOSTNAME")
  string device_info = 3;
}

message EnrollmentRequestAck {
  // true = request received; admin will see OTP on the server console
  bool accepted = 1;
  // Stable identifier the admin can use to match device → OTP
  string device_fingerprint = 2;
}

// ── Existing: enrollment completion (phase 2, OTP required) ──────────────────
message EnrollRequest {
  string enrollment_token = 1;
  bytes device_pubkey = 2;
  bytes csr = 3;
}

message EnrollResponse {
  bool ok = 1;
  bytes client_cert = 2;
}
